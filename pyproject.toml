[tool.ruff]
target-version = "py311"
line-length = 120

[tool.ruff.lint]
select = ["I", "E", "W", "B", "F", "UP", "RUF", "PL", "Q"]
ignore = ["E501"]

[tool.ruff.format]
quote-style = "single"

[tool.ruff.lint.flake8-quotes]
inline-quotes = "single"
multiline-quotes = "single"
docstring-quotes = "double"
avoid-escape = true

[tool.codespell]
skip = "*.xml"

[tool.pytest.ini_options]
asyncio_mode = "auto"
